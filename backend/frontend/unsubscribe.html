<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" type="image/png" sizes="32x32" href="/brand/png/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/brand/png/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/brand/png/apple-touch-icon.png">
<title>Unsubscribe — My Homeschool Curriculum</title>
<meta name="description" content="Unsubscribe from the MyHomeschoolCurriculum newsletter.">
<link rel="canonical" href="https://myhomeschoolcurriculum.com/unsubscribe.html">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--cream:#FDF6EC;--navy:#1E3A4C;--sage:#4A7550;--gold:#D4A84B;--charcoal:#2C3E3F;--text-muted:#7A7A6E}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--charcoal);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border-radius:20px;padding:48px 40px;max-width:480px;width:100%;text-align:center;box-shadow:0 4px 24px rgba(30,58,76,.08)}
.logo{font-family:'Fraunces','Playfair Display',serif;font-size:1.3rem;color:var(--navy);margin-bottom:24px;display:flex;align-items:center;justify-content:center;gap:10px}
.logo svg{width:32px;height:28px;flex-shrink:0}
.logo span{color:var(--gold);font-style:italic;font-weight:400}
.icon{font-size:2.5rem;margin-bottom:16px}
h1{font-family:'Fraunces','Playfair Display',serif;font-size:1.4rem;color:var(--navy);margin-bottom:12px}
p{color:var(--text-muted);font-size:.9rem;line-height:1.6;margin-bottom:20px}
.btn{display:inline-block;background:var(--sage);color:#fff;border:none;padding:12px 28px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;text-decoration:none;transition:all .2s}
.btn:hover{background:#3A6040}
.btn-outline{background:transparent;color:var(--sage);border:1.5px solid var(--sage)}
.btn-outline:hover{background:var(--sage);color:#fff}
.msg{padding:14px;border-radius:10px;font-size:.88rem;margin-bottom:16px}
.msg-success{background:#EAF2EB;color:var(--sage)}
.msg-error{background:#FDF0ED;color:#C8614A}
#loading{color:var(--text-muted);font-size:.88rem}
.skip-link{position:absolute;top:-100px;left:16px;background:var(--navy);color:#fff;padding:8px 16px;border-radius:0 0 8px 8px;font-size:.85rem;font-weight:600;text-decoration:none;z-index:9999;transition:top .2s}
.skip-link:focus{top:0}
</style>
</head>
<body>
<a href="#main-content" class="skip-link">Skip to main content</a>
<main id="main-content">
<div class="card">
  <div class="logo"><svg viewBox="0 0 100 88" aria-hidden="true"><path d="M50 6 L92 38 L8 38 Z" stroke="#1F3A4D" stroke-width="4" stroke-linejoin="round" fill="none"/><path d="M14 38 L14 80 L50 72 L50 38 Z" fill="#1F3A4D"/><path d="M86 38 L86 80 L50 72 L50 38 Z" fill="#D4A84B"/><line x1="50" y1="38" x2="50" y2="72" stroke="#fff" stroke-width="2"/></svg> My Homeschool <span>Curriculum</span></div>
  <div id="content">
    <div id="loading">Processing your request...</div>
  </div>
</div>
</main>

<script>
const API = window.location.hostname === 'localhost' ? 'http://localhost:3001/api' : '/api';
const params = new URLSearchParams(window.location.search);
const email = params.get('email');

async function init() {
  const content = document.getElementById('content');

  if (!email) {
    content.innerHTML = `
      <div class="icon">📧</div>
      <h1>Unsubscribe from Newsletter</h1>
      <p>Enter your email address to unsubscribe from our newsletter.</p>
      <input type="email" id="emailInput" placeholder="your@email.com" style="width:100%;padding:11px 14px;border:1.5px solid #E8DDD0;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.88rem;margin-bottom:16px;outline:none">
      <br><button class="btn" onclick="doUnsubscribe()">Unsubscribe</button>
    `;
    return;
  }

  try {
    const res = await fetch(API + '/newsletter/unsubscribe', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email })
    });
    const data = await res.json();
    content.innerHTML = `
      <div class="icon">👋</div>
      <h1>You've been unsubscribed</h1>
      <p>We've removed <strong>${email}</strong> from our newsletter. You won't receive any more emails from us.</p>
      <p>Changed your mind? You can always resubscribe from our website.</p>
      <a href="/" class="btn btn-outline">← Back to site</a>
    `;
  } catch(e) {
    content.innerHTML = `
      <div class="icon">⚠️</div>
      <h1>Something went wrong</h1>
      <p>We couldn't process your request. Please try again or contact us at contact@myhomeschoolcurriculum.com</p>
      <a href="/" class="btn btn-outline">← Back to site</a>
    `;
  }
}

async function doUnsubscribe() {
  const emailInput = document.getElementById('emailInput').value.trim();
  if (!emailInput) return;
  window.location = '/unsubscribe.html?email=' + encodeURIComponent(emailInput);
}

init();
</script>
</body>
</html>
